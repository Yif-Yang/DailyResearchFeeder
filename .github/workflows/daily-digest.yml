name: Daily Research Feeder

"on":
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: Lookback window in days
        required: false
        default: '2'
      dry_run:
        description: Only generate preview artifact, do not send email
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      LLM_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
      LLM_REASONING_EFFORT: ${{ vars.OPENAI_REASONING_EFFORT || 'xhigh' }}
      EMAIL_PROVIDER: resend
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: state/seen_items.json
          key: dailyresearchfeeder-state-${{ github.run_id }}
          restore-keys: |
            dailyresearchfeeder-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        run: |
          DAYS="${{ github.event.inputs.days || '2' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY_RUN" = "true" ]; then
            python main.py --config config.example.yaml --dry-run --days "$DAYS"
          else
            python main.py --config config.example.yaml --days "$DAYS"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-research-feeder-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/seen_items.json
          key: dailyresearchfeeder-state-${{ github.run_id }}